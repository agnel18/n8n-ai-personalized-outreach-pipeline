name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - name: Install worker deps
        working-directory: automation
        run: npm ci --ignore-scripts   # skip Playwright browser download; not needed for tests

      - name: Unit tests
        working-directory: automation
        run: npm test

      - name: Syntax-check all worker scripts
        run: for f in automation/*.js; do node --check "$f"; done

      - name: Validate workflow JSON
        run: for f in workflow/*.json; do node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "ok $f"; done

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail on committed secrets
        run: |
          # High-signal patterns for real keys (placeholders like `sk-...` won't match).
          PATTERN='sk-[A-Za-z0-9]{20}|xai-[A-Za-z0-9]{20}|AKIA[0-9A-Z]{16}|-----BEGIN ([A-Z]+ )?PRIVATE KEY-----'
          # Exclude *.example and the workflow files themselves (which contain the pattern literal).
          if git grep -nEI "$PATTERN" -- ':!*.example' ':!.github/workflows/*'; then
            echo "::error::Potential secret committed — see matches above."
            exit 1
          fi
          echo "No obvious secrets found."
